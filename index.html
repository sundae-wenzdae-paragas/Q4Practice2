<body>
    <h1>Switch Statement</h1>

    <script>
        let team = "Yellow"; //this is a string

        switch (team){
            case "Yellow":
                alert("Go Yellow Tigers!");
                break;
            case "Blue":
                alert("Go Blue Bears!");
                break;
            case "Red":
                alert("Go Red Bulldogs!");
                break;
            case "Green":
                alert("Go Green Hornets!");
                break;

            default:
                alert("Team could not be determined");
                

        }
    </script>
</body>
